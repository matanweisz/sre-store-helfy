services:
  mysql:
    image: mysql:8.4
    container_name: shop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shoppass
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks: [shop]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shop", "-pshoppass"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: shop-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      JWT_SECRET: dev-secret-change-me
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: shop
      MYSQL_PASSWORD: shoppass
      MYSQL_DATABASE: shop
      PAYMENT_FAILURE_RATE: ${PAYMENT_FAILURE_RATE:-0.08}
    ports:
      - "4000:4000"
    networks: [shop]

  frontend:
    build: ./frontend
    container_name: shop-frontend
    depends_on: [backend]
    ports:
      - "5173:5173"
    networks: [shop]

  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: shop-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [shop]
    depends_on: [backend]

volumes:
  mysql-data:
  prometheus-data:

networks:
  shop:
    driver: bridge
