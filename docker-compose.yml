services:
  mysql:
    image: mysql:8.4
    container_name: shop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shoppass
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks: [shop]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shop", "-pshoppass"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: shop-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      JWT_SECRET: dev-secret-change-me
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: shop
      MYSQL_PASSWORD: shoppass
      MYSQL_DATABASE: shop
      PAYMENT_FAILURE_RATE: ${PAYMENT_FAILURE_RATE:-0.08}
      NODE_ENV: development
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    networks: [shop]
    # Without an explicit json-file driver, Rancher Desktop sometimes uses a
    # driver Filebeat can't tail.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # The node:20-slim image has neither curl nor wget, so we probe with node itself.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: shop-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks: [shop]

  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: shop-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [shop]
    depends_on:
      backend:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    container_name: shop-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      ingest.geoip.downloader.enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [shop]
    # ES 9.x slim image strips curl AND wget — probe via bash's /dev/tcp.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9200 && echo -e 'GET /_cluster/health HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -E '\"status\":\"(yellow|green)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.1
    container_name: shop-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_PUBLICBASEURL: http://localhost:5601
    ports:
      - "5601:5601"
    networks: [shop]

  filebeat:
    image: docker.elastic.co/beats/filebeat:9.4.1
    container_name: shop-filebeat
    user: root  # needed to read /var/lib/docker
    # Image ENTRYPOINT is `filebeat`; the subcommand must be explicit.
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - filebeat-data:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks: [shop]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: shop-grafana
    depends_on:
      - prometheus
      - elasticsearch
    environment:
      # Anonymous admin opens the dashboard with no login. Demo-only.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [shop]

  ai-service:
    build: ./ai-service
    container_name: shop-ai-service
    depends_on:
      elasticsearch:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.6}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      PROMETHEUS_URL: http://prometheus:9090
      ELASTICSEARCH_URL: http://elasticsearch:9200
      METRIC_CATALOG_PATH: /app/metric-catalog.md
      MAX_AGENT_ITERATIONS: "10"
      TOOL_RESULT_CAP_CHARS: "8000"
    # Catalog is mounted read-only so the AI sees the same file humans do.
    volumes:
      - ./metric-catalog.md:/app/metric-catalog.md:ro
    ports:
      - "8000:8000"
    networks: [shop]

  # Optional: the same four tools exposed over MCP (streamable-http), so any
  # MCP-capable agent can investigate this stack. Gated behind the `mcp` profile,
  # so it does NOT start on a plain `docker compose up`. Start it with:
  #   docker compose --profile mcp up -d ai-mcp     # then http://localhost:8001/mcp
  # For local agents (Claude Desktop / Cursor) prefer spawning `obs-mcp` over
  # stdio instead — see ai-service/README or docs.
  ai-mcp:
    build: ./ai-service
    container_name: shop-ai-mcp
    profiles: ["mcp"]
    command: ["obs-mcp"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8001"
      PROMETHEUS_URL: http://prometheus:9090
      ELASTICSEARCH_URL: http://elasticsearch:9200
      METRIC_CATALOG_PATH: /app/metric-catalog.md
    volumes:
      - ./metric-catalog.md:/app/metric-catalog.md:ro
    ports:
      - "8001:8001"
    networks: [shop]

volumes:
  mysql-data:
  prometheus-data:
  es-data:
  filebeat-data:
  grafana-data:

networks:
  shop:
    driver: bridge
