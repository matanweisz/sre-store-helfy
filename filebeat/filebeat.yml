# Filebeat: tail the shop-backend container's stdout and ship to Elasticsearch.

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: false
      templates:
        - condition:
            contains:
              docker.container.name: shop-backend
          config:
            # `container` input was deprecated in Filebeat 9.x; filestream is the
            # supported replacement. The `container` *parser* still exists and
            # is what unwraps the docker JSON-file envelope.
            - type: filestream
              id: shop-backend-${data.docker.container.id}
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              parsers:
                - container:
                    format: docker
                    stream: all
                - ndjson:
                    target: ""              # lift our JSON fields to root
                    overwrite_keys: true    # let our @timestamp win
                    expand_keys: true       # "log.level" -> {log:{level:...}}
                    add_error_key: true
              prospector.scanner.symlinks: true

processors:
  - drop_fields:
      fields:
        - agent
        - ecs.version
        - input
        - log.file
        - log.offset
        - stream
        - container
        - docker      # compose labels are noisy on every record
        - host.name
      ignore_missing: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "logs-app.ecom-dev"
  allow_older_versions: true

# Disable ILM + index-template setup. ES auto-creates a sane mapping on first
# write, which is enough for a single-node setup with no rollover policy.
setup.ilm.enabled: false
setup.template.enabled: false

logging.level: info
